  <text class="code" x="957" y="344">1</text>
  <text class="code" x="1015" y="344">2</text>
  <text class="code" x="1073" y="344">3</text>

  <rect class="table" x="584" y="350" width="220" height="116"/>
  <text class="code" x="602" y="378">full_kv_num_blocks</text>
  <line class="grid" x1="584" y1="394" x2="804" y2="394"/>
