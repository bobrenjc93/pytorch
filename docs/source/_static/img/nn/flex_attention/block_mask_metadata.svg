  <text class="code" x="957" y="280">1</text>
  <text class="code" x="1015" y="280">-</text>
  <text class="code" x="1073" y="280">-</text>
  <text class="code" x="845" y="312">2</text>
  <text class="code" x="899" y="312">0</text>
  <text class="code" x="957" y="312">1</text>
  <text class="code" x="1015" y="312">2</text>
  <text class="code" x="1073" y="312">-</text>
  <text class="code" x="845" y="344">3</text>
