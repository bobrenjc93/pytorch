<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420" role="img" aria-labelledby="title desc">
  <title id="title">Chunk pipeline for overlap kernels</title>
  <desc id="desc">A tensor is split into chunks and each chunk moves through communication, event synchronization, and compute in a staggered pipeline.</desc>
  <style>
    .bg { fill: #fcfcfb; }
    .title { font: 700 24px sans-serif; fill: #1f2328; }
    .label { font: 600 15px sans-serif; fill: #1f2328; }
    .small { font: 500 13px sans-serif; fill: #434a54; }
    .track { fill: #eef1f4; stroke: #c7d0d9; stroke-width: 1; rx: 10; ry: 10; }
    .chunk0 { fill: #ef8d32; }
    .chunk1 { fill: #2f80ed; }
    .chunk2 { fill: #3aa675; }
    .chunk3 { fill: #b85bd7; }
    .event { fill: #f5c451; }
    .arrow { stroke: #7c8791; stroke-width: 2; fill: none; }
  </style>

  <rect class="bg" width="1100" height="420" rx="18" ry="18"/>
  <text class="title" x="48" y="44">Per-chunk pipeline</text>

  <text class="label" x="48" y="98">logical input</text>
  <rect class="track" x="48" y="120" width="260" height="58"/>
  <rect class="chunk0" x="60" y="132" width="56" height="34" rx="6" ry="6"/>
  <rect class="chunk1" x="122" y="132" width="56" height="34" rx="6" ry="6"/>
  <rect class="chunk2" x="184" y="132" width="56" height="34" rx="6" ry="6"/>
  <rect class="chunk3" x="246" y="132" width="50" height="34" rx="6" ry="6"/>
  <text class="small" x="78" y="153">c0</text>
  <text class="small" x="140" y="153">c1</text>
  <text class="small" x="202" y="153">c2</text>
  <text class="small" x="260" y="153">c3</text>

  <line class="arrow" x1="330" y1="149" x2="392" y2="149"/>
  <polygon points="392,149 378,142 378,156" fill="#7c8791"/>

  <text class="label" x="430" y="98">comm stream</text>
  <rect class="track" x="430" y="120" width="600" height="48"/>
  <rect class="chunk0" x="448" y="128" width="120" height="32" rx="8" ry="8"/>
  <rect class="chunk1" x="590" y="128" width="120" height="32" rx="8" ry="8"/>
  <rect class="chunk2" x="732" y="128" width="120" height="32" rx="8" ry="8"/>
  <rect class="chunk3" x="874" y="128" width="120" height="32" rx="8" ry="8"/>
  <text class="small" x="472" y="148">reduce-scatter c0</text>
  <text class="small" x="614" y="148">reduce-scatter c1</text>
  <text class="small" x="756" y="148">reduce-scatter c2</text>
  <text class="small" x="898" y="148">reduce-scatter c3</text>

  <text class="label" x="430" y="214">event edges</text>
  <rect class="track" x="430" y="236" width="600" height="48"/>
  <rect class="event" x="510" y="244" width="36" height="32" rx="8" ry="8"/>
  <rect class="event" x="652" y="244" width="36" height="32" rx="8" ry="8"/>
  <rect class="event" x="794" y="244" width="36" height="32" rx="8" ry="8"/>
  <rect class="event" x="936" y="244" width="36" height="32" rx="8" ry="8"/>
  <text class="small" x="489" y="302">record event for each chunk as soon as communication completes</text>

  <text class="label" x="430" y="338">compute stream</text>
  <rect class="track" x="430" y="360" width="600" height="48"/>
  <rect class="chunk0" x="536" y="368" width="120" height="32" rx="8" ry="8"/>
  <rect class="chunk1" x="678" y="368" width="120" height="32" rx="8" ry="8"/>
  <rect class="chunk2" x="820" y="368" width="120" height="32" rx="8" ry="8"/>
  <rect class="chunk3" x="962" y="368" width="56" height="32" rx="8" ry="8"/>
  <text class="small" x="565" y="388">matmul c0</text>
  <text class="small" x="707" y="388">matmul c1</text>
  <text class="small" x="849" y="388">matmul c2</text>
  <text class="small" x="979" y="388">c3</text>
</svg>
