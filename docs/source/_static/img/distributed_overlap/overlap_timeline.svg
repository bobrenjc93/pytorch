<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="540" viewBox="0 0 1100 540" role="img" aria-labelledby="title desc">
  <title id="title">Sequential and overlapped launch timelines</title>
  <desc id="desc">Two timeline lanes compare a sequential communication then compute schedule with a chunk-overlapped schedule.</desc>
  <style>
    .bg { fill: #fcfcfb; }
    .title { font: 700 24px sans-serif; fill: #1f2328; }
    .subtitle { font: 700 18px sans-serif; fill: #1f2328; }
    .label { font: 600 15px sans-serif; fill: #1f2328; }
    .small { font: 500 13px sans-serif; fill: #434a54; }
    .track { fill: #eef1f4; stroke: #c7d0d9; stroke-width: 1; rx: 10; ry: 10; }
    .idle { fill: #e8ecf0; }
    .compute { fill: #ef8d32; }
    .comm { fill: #2f80ed; }
    .outline { stroke: #9aa4ad; stroke-width: 1.5; fill: none; }
    .axis { stroke: #7c8791; stroke-width: 2; }
  </style>

  <rect class="bg" width="1100" height="540" rx="18" ry="18"/>
  <text class="title" x="48" y="44">Sequential launch versus chunk-overlapped launch</text>

  <text class="subtitle" x="48" y="92">Sequential step</text>
  <text class="label" x="48" y="146">compute stream</text>
  <rect class="track" x="190" y="120" width="820" height="44"/>
  <rect class="compute" x="230" y="126" width="220" height="32" rx="8" ry="8"/>
  <rect class="idle" x="450" y="126" width="310" height="32" rx="8" ry="8"/>
  <rect class="compute" x="760" y="126" width="190" height="32" rx="8" ry="8"/>
  <text class="small" x="270" y="146">local compute</text>
  <text class="small" x="810" y="146">post-comm compute</text>

  <text class="label" x="48" y="212">comm stream</text>
  <rect class="track" x="190" y="186" width="820" height="44"/>
  <rect class="idle" x="230" y="192" width="240" height="32" rx="8" ry="8"/>
  <rect class="comm" x="470" y="192" width="270" height="32" rx="8" ry="8"/>
  <rect class="idle" x="740" y="192" width="210" height="32" rx="8" ry="8"/>
  <text class="small" x="530" y="212">full collective</text>

  <text class="subtitle" x="48" y="302">Chunk-overlapped step</text>
  <text class="label" x="48" y="356">compute stream</text>
  <rect class="track" x="190" y="330" width="820" height="44"/>
  <rect class="compute" x="230" y="336" width="128" height="32" rx="8" ry="8"/>
  <rect class="compute" x="405" y="336" width="128" height="32" rx="8" ry="8"/>
  <rect class="compute" x="580" y="336" width="128" height="32" rx="8" ry="8"/>
  <rect class="compute" x="755" y="336" width="128" height="32" rx="8" ry="8"/>
  <text class="small" x="260" y="356">chunk 0</text>
  <text class="small" x="435" y="356">chunk 1</text>
  <text class="small" x="610" y="356">chunk 2</text>
  <text class="small" x="785" y="356">chunk 3</text>

  <text class="label" x="48" y="422">comm stream</text>
  <rect class="track" x="190" y="396" width="820" height="44"/>
  <rect class="comm" x="300" y="402" width="128" height="32" rx="8" ry="8"/>
  <rect class="comm" x="475" y="402" width="128" height="32" rx="8" ry="8"/>
  <rect class="comm" x="650" y="402" width="128" height="32" rx="8" ry="8"/>
  <rect class="comm" x="825" y="402" width="128" height="32" rx="8" ry="8"/>
  <text class="small" x="330" y="422">chunk 1</text>
  <text class="small" x="505" y="422">chunk 2</text>
  <text class="small" x="680" y="422">chunk 3</text>
  <text class="small" x="855" y="422">chunk 4</text>

  <line class="axis" x1="190" y1="485" x2="1010" y2="485"/>
  <polygon points="1010,485 995,478 995,492" fill="#7c8791"/>
  <text class="label" x="48" y="490">time</text>
  <text class="small" x="675" y="518">Chunked launch makes communication for later chunks overlap with compute on earlier chunks.</text>
</svg>
