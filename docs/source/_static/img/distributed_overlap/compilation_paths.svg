<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Extension build paths and model compilation paths</title>
  <desc id="desc">Diagram showing on-demand and ahead-of-time extension builds feeding a shared library, alongside torch compile and AOTInductor model compilation paths.</desc>
  <style>
    .bg { fill: #fcfcfb; }
    .title { font: 700 24px sans-serif; fill: #1f2328; }
    .panel { fill: #ffffff; stroke: #c7d0d9; stroke-width: 1.4; rx: 18; ry: 18; }
    .head { font: 700 18px sans-serif; fill: #1f2328; }
    .text { font: 500 13px sans-serif; fill: #434a54; }
    .blue { fill: #edf4ff; }
    .orange { fill: #fff4e8; }
    .green { fill: #eef8f2; }
    .purple { fill: #f6effa; }
    .arrow { stroke: #7c8791; stroke-width: 2.2; fill: none; }
    .dashed { stroke-dasharray: 8 6; }
  </style>

  <rect class="bg" width="1200" height="640" rx="18" ry="18"/>
  <text class="title" x="48" y="44">Extension build paths versus model compilation paths</text>

  <rect class="panel blue" x="42" y="84" width="330" height="500"/>
  <text class="head" x="68" y="122">1. Build the extension</text>

  <rect class="panel" x="68" y="150" width="278" height="126"/>
  <text class="head" x="92" y="186">On-demand build</text>
  <text class="text" x="92" y="212">`load()` / `load_inline()`</text>
  <text class="text" x="92" y="236">Compile the C++/CUDA sources on first import.</text>
  <text class="text" x="92" y="260">Fastest path for a prototype.</text>

  <rect class="panel" x="68" y="314" width="278" height="126"/>
  <text class="head" x="92" y="350">Ahead-of-time build</text>
  <text class="text" x="92" y="376">`CUDAExtension`, setuptools, CMake</text>
  <text class="text" x="92" y="400">Build the `.so` in CI or during packaging.</text>
  <text class="text" x="92" y="424">Better fit for deployment and reuse.</text>

  <rect class="panel orange" x="430" y="84" width="330" height="500"/>
  <text class="head" x="456" y="122">2. Run from Python</text>

  <rect class="panel" x="456" y="150" width="278" height="126"/>
  <text class="head" x="480" y="186">Eager mode</text>
  <text class="text" x="480" y="212">Python calls `torch.ops.overlap_demo.*`.</text>
  <text class="text" x="480" y="236">The shared library executes directly.</text>

  <rect class="panel" x="456" y="314" width="278" height="164"/>
  <text class="head" x="480" y="350">`torch.compile`</text>
  <text class="text" x="480" y="376">Captures and JIT-compiles the surrounding graph.</text>
  <text class="text" x="480" y="400">The custom op is usually an external node.</text>
  <text class="text" x="480" y="424">Inductor optimizes around it.</text>
  <text class="text" x="480" y="448">It does not compile your extension source.</text>

  <rect class="panel green" x="818" y="84" width="340" height="500"/>
  <text class="head" x="844" y="122">3. Package for deployment</text>

  <rect class="panel" x="844" y="150" width="288" height="164"/>
  <text class="head" x="868" y="186">`torch.export`</text>
  <text class="text" x="868" y="212">Needs the op schema and fake kernel.</text>
  <text class="text" x="868" y="236">Captures the exported graph with the custom op.</text>

  <rect class="panel" x="844" y="354" width="288" height="160"/>
  <text class="head" x="868" y="390">AOTInductor</text>
  <text class="text" x="868" y="416">AOT-compiles the exported model into artifacts.</text>
  <text class="text" x="868" y="440">The custom-op library still must be loadable and</text>
  <text class="text" x="868" y="462">registered unless you lowered the op away.</text>

  <line class="arrow" x1="346" y1="214" x2="430" y2="214"/>
  <polygon points="430,214 416,207 416,221" fill="#7c8791"/>
  <line class="arrow" x1="346" y1="378" x2="430" y2="378"/>
  <polygon points="430,378 416,371 416,385" fill="#7c8791"/>
  <line class="arrow" x1="760" y1="230" x2="844" y2="230"/>
  <polygon points="844,230 830,223 830,237" fill="#7c8791"/>
  <line class="arrow" x1="760" y1="426" x2="844" y2="426"/>
  <polygon points="844,426 830,419 830,433" fill="#7c8791"/>

  <path class="arrow dashed" d="M 208 474 C 420 560, 760 560, 988 530"/>
  <polygon points="988,530 973,526 979,539" fill="#7c8791"/>
  <text class="text" x="346" y="556">same custom-op shared library must be available to eager, `torch.compile`, and AOT deployment flows</text>
</svg>
